<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Session Replayer</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        background: #0f1117;
        color: #e2e8f0;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 16px;
        background: #1a1d27;
        border-bottom: 1px solid #2d3148;
        flex-shrink: 0;
      }
      header h1 { font-size: 13px; font-weight: 600; color: #a78bfa; }

      .workspace { flex: 1; display: flex; overflow: hidden; }

      /* ── Left pane ── */
      #left {
        display: flex;
        flex-direction: column;
        width: 340px;
        border-right: 1px solid #2d3148;
        flex-shrink: 0;
      }
      .pane-header {
        padding: 8px 12px;
        background: #1a1d27;
        border-bottom: 1px solid #2d3148;
        font-size: 12px;
        color: #94a3b8;
      }
      textarea {
        flex: 1;
        background: #0f1117;
        color: #cbd5e1;
        border: none;
        border-bottom: 1px solid #2d3148;
        padding: 12px;
        font-family: monospace;
        font-size: 11px;
        resize: none;
        outline: none;
      }
      .left-footer {
        padding: 10px;
        background: #1a1d27;
        display: flex;
        gap: 8px;
      }
      button {
        padding: 7px 14px;
        border: none;
        border-radius: 5px;
        font-weight: 700;
        font-size: 12px;
        cursor: pointer;
      }
      #load-btn  { flex: 1; background: #a78bfa; color: #0f1117; }
      #reset-btn { background: #2d3148; color: #94a3b8; }

      /* ── Right pane ── */
      #right { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

      .controls {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 12px;
        background: #1a1d27;
        border-bottom: 1px solid #2d3148;
        flex-shrink: 0;
      }
      #play-btn  { background: #22c55e; color: #0f1117; padding: 5px 14px; }
      #pause-btn { background: #f59e0b; color: #0f1117; padding: 5px 14px; }
      #play-btn:disabled, #pause-btn:disabled { opacity: 0.35; cursor: default; }

      .speed-label { font-size: 11px; color: #64748b; }
      #speed { background: #0f1117; color: #e2e8f0; border: 1px solid #2d3148; border-radius: 4px; padding: 3px 6px; font-size: 11px; }

      /* timeline */
      .timeline-wrap {
        padding: 6px 12px;
        background: #1a1d27;
        border-bottom: 1px solid #2d3148;
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
      }
      #timeline { flex: 1; accent-color: #a78bfa; cursor: pointer; }
      #time-label { font-size: 11px; color: #64748b; width: 90px; text-align: right; white-space: nowrap; }

      /* iframe viewport */
      #viewport {
        flex: 1;
        position: relative;
        overflow: hidden;
        background: #000;
      }
      iframe {
        border: none;
        position: absolute;
        top: 0; left: 0;
        transform-origin: top left;
      }

      /* fake mouse cursor */
      #cursor {
        position: absolute;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: rgba(167,139,250,0.85);
        border: 2px solid #fff;
        pointer-events: none;
        display: none;
        transform: translate(-50%, -50%);
        transition: left 0.05s linear, top 0.05s linear;
        z-index: 10;
      }
      #cursor.click { background: #f87171; }

      #statusbar {
        padding: 6px 12px;
        background: #1a1d27;
        border-top: 1px solid #2d3148;
        font-size: 11px;
        color: #94a3b8;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <header><h1>Session Replayer</h1></header>

    <div class="workspace">
      <!-- left: paste events JSON -->
      <div id="left">
        <div class="pane-header">Events JSON</div>
        <textarea id="input" placeholder="Paste recorded events array here..."></textarea>
        <div class="left-footer">
          <button id="load-btn">Load</button>
          <button id="reset-btn">Reset</button>
        </div>
      </div>

      <!-- right: playback -->
      <div id="right">
        <div class="controls">
          <button id="play-btn" disabled>▶ Play</button>
          <button id="pause-btn" disabled>⏸ Pause</button>
          <span class="speed-label">Speed</span>
          <select id="speed">
            <option value="0.5">0.5×</option>
            <option value="1" selected>1×</option>
            <option value="2">2×</option>
            <option value="4">4×</option>
          </select>
        </div>
        <div class="timeline-wrap">
          <input type="range" id="timeline" min="0" max="100" value="0" step="0.1" />
          <span id="time-label">0:00 / 0:00</span>
        </div>
        <div id="viewport">
          <iframe id="frame" sandbox="allow-same-origin allow-scripts"></iframe>
          <div id="cursor"></div>
        </div>
        <div id="statusbar">Load an events JSON to begin</div>
      </div>
    </div>

    <script>
      // ─── Enums ──────────────────────────────────────────────────────────────
      const EventType = { DomContentLoaded:0, Load:1, FullSnapshot:2, IncrementalSnapshot:3 };
      const IncrementalSource = { Mutation:0, MouseMove:1, MouseInteraction:2, Scroll:3, ViewportResize:4 };
      const NodeType = { Document:0, DocumentType:1, Element:2, Text:3, CDATA:4, Comment:5 };

      // ─── Rebuild (mirrors visualiser.html logic + id tagging) ───────────────
      // Maps serialised node id → live DOM node in the iframe
      const replayMirror = {};

      function buildNode(n, doc) {
        let node;
        switch (n.type) {
          case NodeType.Document: return doc;

          case NodeType.DocumentType:
            return doc.implementation.createDocumentType(n.name, n.publicId, n.systemId);

          case NodeType.Element: {
            if ((n.tagName === 'link' || n.tagName === 'style') && n.attributes?._cssText) {
              node = doc.createElement('style');
              node.textContent = n.attributes._cssText;
            } else {
              node = doc.createElement(n.tagName);
            }

            for (const name in n.attributes || {}) {
              if (name === '_cssText' || name === 'rr_dataURL') continue;
              try { node.setAttribute(name, n.attributes[name]); } catch (_) {}
            }

            if ((n.tagName === 'input' || n.tagName === 'textarea') && n.attributes?.value !== undefined) {
              node.value = n.attributes.value;
            }
            if (n.tagName === 'input' && n.attributes?.checked) node.checked = true;
            if (n.tagName === 'select' && n.attributes?.value) node.value = n.attributes.value;

            if (n.tagName === 'canvas' && n.attributes?.rr_dataURL) {
              const img = new Image();
              img.onload = () => node.getContext('2d').drawImage(img, 0, 0);
              img.src = n.attributes.rr_dataURL;
            }

            if (n.id !== undefined) replayMirror[n.id] = node;
            return node;
          }

          case NodeType.Text: {
            node = doc.createTextNode(n.textContent);
            if (n.id !== undefined) replayMirror[n.id] = node;
            return node;
          }

          case NodeType.CDATA:   return doc.createCDATASection(n.textContent);
          case NodeType.Comment: return doc.createComment(n.textContent);
          default: return null;
        }
      }

      function rebuild(n, doc) {
        const root = buildNode(n, doc);
        if (!root) return null;
        if (n.type === NodeType.Element || n.type === NodeType.Document) {
          for (const child of n.childNodes || []) {
            const c = rebuild(child, doc);
            if (c) root.appendChild(c);
          }
        }
        return root;
      }

      function appendChildren(snapNode, target, doc) {
        for (const child of snapNode?.childNodes || []) {
          const node = rebuild(child, doc);
          if (node) target.appendChild(node);
        }
      }

      // ─── Full snapshot render ───────────────────────────────────────────────
      function renderFullSnapshot(data) {
        Object.keys(replayMirror).forEach(k => delete replayMirror[k]);

        const frame = document.getElementById('frame');
        const doc = frame.contentDocument;
        doc.open();
        doc.write('<!DOCTYPE html><html><head></head><body></body></html>');
        doc.close();

        // data is the `node` from FullSnapshot — it may be the document node
        // or the html element depending on what was passed to snapshot()
        let htmlNode = data;
        if (data.type === NodeType.Document) {
          htmlNode = data.childNodes?.find(n => n.tagName === 'html');
        }
        if (!htmlNode) return;

        for (const [k, v] of Object.entries(htmlNode.attributes || {})) {
          doc.documentElement.setAttribute(k, v);
        }
        if (htmlNode.id !== undefined) replayMirror[htmlNode.id] = doc.documentElement;

        const headSnap = htmlNode.childNodes?.find(n => n.tagName === 'head');
        const bodySnap = htmlNode.childNodes?.find(n => n.tagName === 'body');

        if (headSnap) {
          if (headSnap.id !== undefined) replayMirror[headSnap.id] = doc.head;
          appendChildren(headSnap, doc.head, doc);
        }
        if (bodySnap) {
          if (bodySnap.id !== undefined) replayMirror[bodySnap.id] = doc.body;
          for (const [k, v] of Object.entries(bodySnap.attributes || {})) {
            doc.body.setAttribute(k, v);
          }
          appendChildren(bodySnap, doc.body, doc);
        }
      }

      // ─── Incremental event handlers ─────────────────────────────────────────
      function applyMutation({ texts, attributes, removes, adds }) {
        const frame = document.getElementById('frame');
        const doc = frame.contentDocument;

        (texts || []).forEach(({ id, value }) => {
          const node = replayMirror[id];
          if (node) node.textContent = value;
        });

        (attributes || []).forEach(({ id, attributes: attrs }) => {
          const node = replayMirror[id];
          if (!node) return;
          for (const [name, value] of Object.entries(attrs)) {
            if (value === null) node.removeAttribute(name);
            else try { node.setAttribute(name, value); } catch (_) {}
          }
        });

        (removes || []).forEach(({ parentId, id }) => {
          const parent = replayMirror[parentId];
          const child = replayMirror[id];
          if (parent && child && child.parentNode === parent) {
            parent.removeChild(child);
          }
          delete replayMirror[id];
        });

        // adds: our observer.ts port doesn't capture the serialised node data,
        // only the id. If a `node` field is present (future improvement), rebuild it.
        (adds || []).forEach(({ parentId, nextId, node: serialisedNode }) => {
          if (!serialisedNode) return;
          const parent = replayMirror[parentId];
          if (!parent) return;
          const newNode = rebuild(serialisedNode, doc);
          if (!newNode) return;
          const next = nextId != null ? replayMirror[nextId] : null;
          parent.insertBefore(newNode, next || null);
        });
      }

      const cursorEl = document.getElementById('cursor');

      function applyMouseMove({ positions }) {
        if (!positions?.length) return;
        const last = positions[positions.length - 1];
        moveCursor(last.x, last.y);
      }

      function applyMouseInteraction({ type, x, y }) {
        moveCursor(x, y);
        // flash red on click / touchstart
        if (type === 2 || type === 7) {
          cursorEl.classList.add('click');
          setTimeout(() => cursorEl.classList.remove('click'), 300);
        }
      }

      function moveCursor(x, y) {
        const vp = document.getElementById('viewport');
        const scale = currentScale();
        cursorEl.style.display = 'block';
        cursorEl.style.left = (x * scale) + 'px';
        cursorEl.style.top  = (y * scale) + 'px';
      }

      function applyScroll({ id, x, y }) {
        const node = replayMirror[id];
        if (!node) return;
        node.scrollLeft = x;
        node.scrollTop  = y;
      }

      function applyViewportResize({ width, height }) {
        setIframeSize(width, height);
      }

      function applyEvent(e) {
        if (e.type === EventType.IncrementalSnapshot) {
          const d = e.data;
          switch (d.source) {
            case IncrementalSource.Mutation:         applyMutation(d);         break;
            case IncrementalSource.MouseMove:        applyMouseMove(d);        break;
            case IncrementalSource.MouseInteraction: applyMouseInteraction(d); break;
            case IncrementalSource.Scroll:           applyScroll(d);           break;
            case IncrementalSource.ViewportResize:   applyViewportResize(d);   break;
          }
        }
        updateTimelineProgress(e.timestamp);
      }

      // ─── Iframe scaling ─────────────────────────────────────────────────────
      let recordedWidth  = 1280;
      let recordedHeight = 800;

      function currentScale() {
        const vp = document.getElementById('viewport');
        return Math.min(vp.clientWidth / recordedWidth, vp.clientHeight / recordedHeight);
      }

      function setIframeSize(w, h) {
        recordedWidth  = w || recordedWidth;
        recordedHeight = h || recordedHeight;
        const frame = document.getElementById('frame');
        frame.style.width  = recordedWidth  + 'px';
        frame.style.height = recordedHeight + 'px';
        const scale = currentScale();
        frame.style.transform = `scale(${scale})`;
      }

      // ─── Playback engine ────────────────────────────────────────────────────
      let allEvents  = [];
      let timers     = [];
      let pausedAt   = null;   // wall-clock ms when paused
      let startedAt  = null;   // wall-clock ms when play began (adjusted for speed)
      let baselineTs = 0;      // timestamp of first incremental event

      function getSpeed() { return parseFloat(document.getElementById('speed').value); }

      function formatTime(ms) {
        const s = Math.floor(ms / 1000);
        return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
      }

      function updateTimelineProgress(eventTs) {
        const elapsed  = eventTs - baselineTs;
        const duration = allEvents[allEvents.length - 1].timestamp - baselineTs;
        const pct = duration > 0 ? (elapsed / duration) * 100 : 0;
        document.getElementById('timeline').value = pct;
        document.getElementById('time-label').textContent =
          `${formatTime(elapsed)} / ${formatTime(duration)}`;
      }

      function clearTimers() {
        timers.forEach(clearTimeout);
        timers = [];
      }

      function scheduleEvents(fromTs) {
        const speed   = getSpeed();
        const now     = Date.now();
        startedAt     = now - ((fromTs - baselineTs) / speed);

        allEvents.forEach(e => {
          if (e.type === EventType.IncrementalSnapshot) {
            const delay = (e.timestamp - fromTs) / speed;
            if (delay < 0) return;
            timers.push(setTimeout(() => applyEvent(e), delay));
          }
        });

        // auto-stop at end
        const duration = (allEvents[allEvents.length-1].timestamp - fromTs) / speed;
        timers.push(setTimeout(onEnded, duration));
      }

      function onEnded() {
        document.getElementById('play-btn').disabled  = false;
        document.getElementById('pause-btn').disabled = true;
        setStatus('Playback complete');
        pausedAt = null;
      }

      function play() {
        clearTimers();
        cursorEl.style.display = 'none';

        const snap = allEvents.find(e => e.type === EventType.FullSnapshot);
        if (!snap) return setStatus('No FullSnapshot found in events');

        renderFullSnapshot(snap.data.node ?? snap.data);

        const incEvents = allEvents.filter(e => e.type === EventType.IncrementalSnapshot);
        baselineTs = snap.timestamp;

        document.getElementById('play-btn').disabled  = true;
        document.getElementById('pause-btn').disabled = false;

        scheduleEvents(baselineTs);
        setStatus(`Playing ${allEvents.length} events…`);
      }

      function pause() {
        clearTimers();
        pausedAt = Date.now();
        document.getElementById('play-btn').disabled  = false;
        document.getElementById('pause-btn').disabled = true;
        setStatus('Paused');
      }

      function resume() {
        if (pausedAt === null) { play(); return; }

        const elapsed  = (pausedAt - startedAt) * getSpeed();
        const resumeTs = baselineTs + elapsed;
        pausedAt = null;

        // re-render up to resumeTs
        const snap = allEvents.find(e => e.type === EventType.FullSnapshot);
        renderFullSnapshot(snap.data.node ?? snap.data);
        allEvents
          .filter(e => e.type === EventType.IncrementalSnapshot && e.timestamp <= resumeTs)
          .forEach(applyEvent);

        document.getElementById('play-btn').disabled  = true;
        document.getElementById('pause-btn').disabled = false;

        scheduleEvents(resumeTs);
        setStatus(`Resuming…`);
      }

      // ─── Timeline scrub ─────────────────────────────────────────────────────
      document.getElementById('timeline').addEventListener('input', () => {
        if (!allEvents.length) return;
        clearTimers();

        const pct      = parseFloat(document.getElementById('timeline').value) / 100;
        const duration = allEvents[allEvents.length-1].timestamp - baselineTs;
        const targetTs = baselineTs + pct * duration;

        const snap = allEvents.find(e => e.type === EventType.FullSnapshot);
        renderFullSnapshot(snap.data.node ?? snap.data);
        allEvents
          .filter(e => e.type === EventType.IncrementalSnapshot && e.timestamp <= targetTs)
          .forEach(applyEvent);

        pausedAt = Date.now();
        startedAt = pausedAt - ((targetTs - baselineTs) / getSpeed());

        document.getElementById('play-btn').disabled  = false;
        document.getElementById('pause-btn').disabled = true;
        setStatus('Scrubbed to ' + formatTime(targetTs - baselineTs));
      });

      // ─── UI wiring ──────────────────────────────────────────────────────────
      function setStatus(msg) { document.getElementById('statusbar').textContent = msg; }

      document.getElementById('load-btn').onclick = () => {
        const raw = document.getElementById('input').value.trim();
        if (!raw) return;
        let parsed;
        try { parsed = JSON.parse(raw); } catch { return alert('Invalid JSON'); }

        allEvents = Array.isArray(parsed) ? parsed : [parsed];
        allEvents.sort((a, b) => a.timestamp - b.timestamp);

        clearTimers();
        cursorEl.style.display = 'none';
        document.getElementById('timeline').value = 0;

        const snap = allEvents.find(e => e.type === EventType.FullSnapshot);
        if (snap) {
          renderFullSnapshot(snap.data.node ?? snap.data);
          baselineTs = snap.timestamp;
          setIframeSize(recordedWidth, recordedHeight);
        }

        const duration = allEvents[allEvents.length-1].timestamp - (snap?.timestamp ?? allEvents[0].timestamp);
        document.getElementById('play-btn').disabled  = false;
        document.getElementById('pause-btn').disabled = true;
        document.getElementById('time-label').textContent = `0:00 / ${formatTime(duration)}`;
        setStatus(`Loaded ${allEvents.length} events — ${formatTime(duration)} duration`);
      };

      document.getElementById('reset-btn').onclick = () => {
        clearTimers();
        allEvents = [];
        Object.keys(replayMirror).forEach(k => delete replayMirror[k]);
        cursorEl.style.display = 'none';
        document.getElementById('frame').contentDocument?.open();
        document.getElementById('frame').contentDocument?.write('');
        document.getElementById('frame').contentDocument?.close();
        document.getElementById('timeline').value = 0;
        document.getElementById('time-label').textContent = '0:00 / 0:00';
        document.getElementById('play-btn').disabled  = true;
        document.getElementById('pause-btn').disabled = true;
        setStatus('Reset');
      };

      document.getElementById('play-btn').onclick  = () => pausedAt !== null ? resume() : play();
      document.getElementById('pause-btn').onclick = pause;

      // Scale iframe when window resizes
      window.addEventListener('resize', () => setIframeSize());
    </script>
  </body>
</html>
